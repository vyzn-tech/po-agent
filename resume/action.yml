name: 'PO Agent Resume'
description: 'Checks if CI/preview workflows completed and dispatches a resume event to the PO Agent. Delegates state checking to a repo-provided gate script.'

inputs:
  github_token:
    description: 'GitHub token'
    default: ${{ github.token }}
  required_workflows:
    description: 'Comma-separated list of required workflow names to wait for'
    default: ''
  optional_workflows:
    description: 'Comma-separated list of optional workflow names (only waited on if triggered)'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Check workflows and resume
      uses: actions/github-script@v7
      env:
        REQUIRED_WORKFLOWS: ${{ inputs.required_workflows }}
        OPTIONAL_WORKFLOWS: ${{ inputs.optional_workflows }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const workflowRun = context.payload.workflow_run;
          console.log(`Workflow "${workflowRun.name}" completed: ${workflowRun.conclusion}`);

          // Get associated PR
          const prs = workflowRun.pull_requests;
          if (!prs || prs.length === 0) {
            console.log('No PR associated — skipping');
            return;
          }
          const pr = prs[0];
          console.log(`PR #${pr.number}`);

          // Checkout repo to access gate script
          const { execSync } = require('child_process');

          // Check if gate script exists in the repo
          let gateScriptPath;
          try {
            // We need the repo checked out to access the script
            execSync(`git clone --depth 1 --single-branch --branch ${workflowRun.head_branch} https://x-access-token:${process.env.GITHUB_TOKEN}@github.com/${context.repo.owner}/${context.repo.repo}.git /tmp/repo-checkout 2>/dev/null`);
            gateScriptPath = '/tmp/repo-checkout/.po-agent/scripts/is-waiting.sh';

            const fs = require('fs');
            if (!fs.existsSync(gateScriptPath)) {
              console.log('No .po-agent/scripts/is-waiting.sh found — skipping');
              return;
            }
            // Ensure executable
            fs.chmodSync(gateScriptPath, 0o755);
          } catch (e) {
            console.log(`Failed to checkout repo for gate script: ${e.message}`);
            return;
          }

          // Also make azdo-tags.sh executable if it exists
          const fs = require('fs');
          const azdoTagsPath = '/tmp/repo-checkout/.po-agent/scripts/azdo-tags.sh';
          if (fs.existsSync(azdoTagsPath)) {
            fs.chmodSync(azdoTagsPath, 0o755);
          }

          // Call gate script: exit 0 = waiting, non-zero = skip
          let gateOutput;
          try {
            gateOutput = execSync(`${gateScriptPath} ${pr.number}`, {
              env: {
                ...process.env,
                PATH: `/tmp/repo-checkout/.po-agent/scripts:${process.env.PATH}`,
                GH_TOKEN: process.env.GITHUB_TOKEN
              },
              encoding: 'utf-8',
              timeout: 30000
            }).trim();
          } catch (e) {
            console.log(`Gate script exited non-zero — PR is not waiting: ${e.stderr || e.message}`);
            return;
          }

          // Parse optional JSON metadata from gate stdout
          let workItemId = '';
          let currentAttempt = 0;
          if (gateOutput) {
            try {
              const meta = JSON.parse(gateOutput);
              workItemId = meta.work_item_id || '';
              currentAttempt = meta.attempt || 0;
              console.log(`Gate metadata: work_item_id=${workItemId}, attempt=${currentAttempt}`);
            } catch {
              console.log(`Gate stdout (not JSON): ${gateOutput}`);
            }
          }

          // Get PR head SHA for workflow checks
          const { data: prData } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number
          });
          const headSha = prData.head.sha;

          // Check required/optional workflows
          const { data: workflows } = await github.rest.actions.listRepoWorkflows({
            owner: context.repo.owner, repo: context.repo.repo
          });

          const requiredNames = (process.env.REQUIRED_WORKFLOWS || '')
            .split(',').map(s => s.trim()).filter(Boolean);
          const optionalNames = (process.env.OPTIONAL_WORKFLOWS || '')
            .split(',').map(s => s.trim()).filter(Boolean);

          // If no required workflows specified, use the triggering workflow
          if (requiredNames.length === 0) {
            requiredNames.push(workflowRun.name);
          }

          let allCompleted = true;
          let anyFailed = false;
          const statuses = {};

          async function checkWorkflow(name, required) {
            const wf = workflows.workflows.find(w => w.name === name);
            if (!wf) { statuses[name] = 'not_found'; return; }

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: wf.id, head_sha: headSha, per_page: 1
            });

            if (runs.workflow_runs.length === 0) {
              statuses[name] = 'not_run';
              if (required) allCompleted = false;
            } else {
              const run = runs.workflow_runs[0];
              statuses[name] = `${run.status}:${run.conclusion}`;
              if (run.status !== 'completed') {
                allCompleted = false;
              } else if (run.conclusion !== 'success' && run.conclusion !== 'skipped') {
                anyFailed = true;
              }
            }
          }

          for (const name of requiredNames) await checkWorkflow(name, true);
          for (const name of optionalNames) await checkWorkflow(name, false);

          console.log('Workflow statuses:', JSON.stringify(statuses, null, 2));

          if (!allCompleted) {
            console.log('Not all workflows completed — waiting');
            return;
          }

          // All done — dispatch resume
          const overallResult = anyFailed ? 'failure' : 'success';
          const summary = Object.entries(statuses).map(([n, s]) => `${n}: ${s}`).join(', ');

          const payload = {
            pr_number: pr.number,
            trigger_workflow: workflowRun.name,
            trigger_result: overallResult,
            workflow_summary: summary
          };

          if (workItemId) {
            payload.work_item_id = workItemId;
            console.log(`Including work_item_id: ${workItemId}`);
          }
          if (currentAttempt) {
            payload.attempt = currentAttempt;
          }

          console.log(`Dispatching resume for PR #${pr.number} (result: ${overallResult})`);
          await github.rest.repos.createDispatchEvent({
            owner: context.repo.owner,
            repo: context.repo.repo,
            event_type: 'po-agent-resume',
            client_payload: payload
          });

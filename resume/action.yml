name: 'PO Agent Resume'
description: 'Checks if CI/preview workflows completed and dispatches a resume event to the PO Agent.'

inputs:
  github_token:
    description: 'GitHub token'
    default: ${{ github.token }}
  max_attempts:
    description: 'Maximum resume attempts per PR'
    default: '10'
  required_workflows:
    description: 'Comma-separated list of required workflow names to wait for'
    default: ''
  optional_workflows:
    description: 'Comma-separated list of optional workflow names (only waited on if triggered)'
    default: ''
  work_item_id:
    description: 'Azure DevOps work item ID to pass through in the dispatch payload (for AzDo integration)'
    default: ''
  secrets:
    description: 'Newline-separated KEY=VALUE pairs for integration-specific state tracking (passed to skills).'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Export secrets
      shell: bash
      env:
        SECRETS_INPUT: ${{ inputs.secrets }}
      run: |
        if [ -n "$SECRETS_INPUT" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            [[ "$line" == \#* ]] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<< "$SECRETS_INPUT"
        fi

    - name: Check workflows and resume
      uses: actions/github-script@v7
      env:
        MAX_ATTEMPTS: ${{ inputs.max_attempts }}
        REQUIRED_WORKFLOWS: ${{ inputs.required_workflows }}
        OPTIONAL_WORKFLOWS: ${{ inputs.optional_workflows }}
        WORK_ITEM_ID: ${{ inputs.work_item_id }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const workflowRun = context.payload.workflow_run;
          console.log(`Workflow "${workflowRun.name}" completed: ${workflowRun.conclusion}`);

          // Get associated PR
          const prs = workflowRun.pull_requests;
          if (!prs || prs.length === 0) {
            console.log('No PR associated — skipping');
            return;
          }
          const pr = prs[0];
          console.log(`PR #${pr.number}`);

          // Check if this PR has a po-agent label indicating it's waiting
          const { data: prData } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number
          });
          const headSha = prData.head.sha;

          const labels = prData.labels.map(l => l.name);
          const isWaiting = labels.includes('po-agent:waiting-ci');
          if (!isWaiting) {
            console.log('PR does not have po-agent:waiting-ci label — skipping');
            return;
          }

          // Get attempt count from labels
          const attemptLabel = labels.find(l => l.startsWith('po-agent:attempt-'));
          const currentAttempt = attemptLabel ? parseInt(attemptLabel.split('-')[1], 10) : 0;
          const maxAttempts = parseInt(process.env.MAX_ATTEMPTS || '10', 10);

          if (currentAttempt >= maxAttempts) {
            console.log(`Max ${maxAttempts} attempts reached — stopping`);
            // Remove waiting label, add failed
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, name: 'po-agent:waiting-ci'
              });
            } catch {}
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number, labels: ['po-agent:failed']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number,
              body: `⚠️ **PO Agent stopped after ${maxAttempts} attempts.** Please review and re-trigger manually if needed.`
            });
            return;
          }

          // Check required workflows
          const { data: workflows } = await github.rest.actions.listRepoWorkflows({
            owner: context.repo.owner, repo: context.repo.repo
          });

          const requiredNames = (process.env.REQUIRED_WORKFLOWS || '')
            .split(',').map(s => s.trim()).filter(Boolean);
          const optionalNames = (process.env.OPTIONAL_WORKFLOWS || '')
            .split(',').map(s => s.trim()).filter(Boolean);

          // If no required workflows specified, use the triggering workflow
          if (requiredNames.length === 0) {
            requiredNames.push(workflowRun.name);
          }

          let allCompleted = true;
          let anyFailed = false;
          const statuses = {};

          async function checkWorkflow(name, required) {
            const wf = workflows.workflows.find(w => w.name === name);
            if (!wf) { statuses[name] = 'not_found'; return; }

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: wf.id, head_sha: headSha, per_page: 1
            });

            if (runs.workflow_runs.length === 0) {
              statuses[name] = 'not_run';
              if (required) allCompleted = false;
            } else {
              const run = runs.workflow_runs[0];
              statuses[name] = `${run.status}:${run.conclusion}`;
              if (run.status !== 'completed') {
                allCompleted = false;
              } else if (run.conclusion !== 'success' && run.conclusion !== 'skipped') {
                anyFailed = true;
              }
            }
          }

          for (const name of requiredNames) await checkWorkflow(name, true);
          for (const name of optionalNames) await checkWorkflow(name, false);

          console.log('Workflow statuses:', JSON.stringify(statuses, null, 2));

          if (!allCompleted) {
            console.log('Not all workflows completed — waiting');
            return;
          }

          // All done — dispatch resume
          const nextAttempt = currentAttempt + 1;
          const overallResult = anyFailed ? 'failure' : 'success';
          const summary = Object.entries(statuses).map(([n, s]) => `${n}: ${s}`).join(', ');

          // Update labels
          if (attemptLabel) {
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, name: attemptLabel
              });
            } catch {}
          }
          try {
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number, name: 'po-agent:waiting-ci'
            });
          } catch {}
          await github.rest.issues.addLabels({
            owner: context.repo.owner, repo: context.repo.repo,
            issue_number: pr.number,
            labels: ['po-agent:in-progress', `po-agent:attempt-${nextAttempt}`]
          });

          // Dispatch resume event
          console.log(`Dispatching resume for PR #${pr.number} (attempt ${nextAttempt}, result: ${overallResult})`);
          const payload = {
            pr_number: pr.number,
            trigger_workflow: workflowRun.name,
            trigger_result: overallResult,
            workflow_summary: summary,
            attempt: nextAttempt
          };

          // Pass through work_item_id for AzDo integration
          // Priority: explicit input > detected from PR title
          let workItemId = process.env.WORK_ITEM_ID;
          if (!workItemId) {
            // Try to detect from PR title (VYZN-1234 or AB#1234)
            const titleMatch = prData.title?.match(/(?:AB#|VYZN-)(\d+)/);
            if (titleMatch) workItemId = titleMatch[1];
          }
          if (workItemId) {
            payload.work_item_id = workItemId;
            console.log(`Including work_item_id: ${workItemId}`);
          }

          await github.rest.repos.createDispatchEvent({
            owner: context.repo.owner,
            repo: context.repo.repo,
            event_type: 'po-agent-resume',
            client_payload: payload
          });

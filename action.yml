name: 'PO Agent'
description: 'AI-powered Product Owner agent. Triggered from GitHub PRs, Slack, or any webhook source.'
branding:
  icon: 'cpu'
  color: 'orange'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true
  max_budget_usd:
    description: 'Max spend per session in USD'
    default: '5.0'
  model:
    description: 'Claude model to use'
    default: 'claude-sonnet-4-20250514'
  claude_cli_version:
    description: 'Claude Code CLI version to install (e.g. 1.0.16). Use "latest" for the newest release.'
    default: '1.0.16'
  trigger_word:
    description: 'The trigger word that invokes the agent (e.g. @po-agent)'
    default: '@po-agent'
  secrets:
    description: 'Newline-separated KEY=VALUE pairs. Made available as env vars to the agent and skills.'
    default: ''
  github_token:
    description: 'GitHub token for posting comments and reactions. Defaults to github.token.'
    default: ${{ github.token }}

outputs:
  response:
    description: 'The agent response text'
    value: ${{ steps.run-agent.outputs.response }}
  cost_usd:
    description: 'Session cost in USD'
    value: ${{ steps.run-agent.outputs.cost_usd }}

runs:
  using: 'composite'
  steps:
    # ── 1. Detect source from GitHub event payload ──────────────────────
    - name: Detect source and extract context
      id: source
      shell: bash
      env:
        TRIGGER_WORD: ${{ inputs.trigger_word }}
      run: |
        EVENT=$(cat "$GITHUB_EVENT_PATH")

        case "$GITHUB_EVENT_NAME" in
          issue_comment)
            BODY=$(echo "$EVENT" | jq -r '.comment.body')
            # Strip trigger word from message
            MESSAGE=$(echo "$BODY" | sed "s|$TRIGGER_WORD||g" | xargs)
            echo "source=github" >> "$GITHUB_OUTPUT"
            echo "message=$MESSAGE" >> "$GITHUB_OUTPUT"
            echo "pr_number=$(echo "$EVENT" | jq -r '.issue.number')" >> "$GITHUB_OUTPUT"
            echo "comment_id=$(echo "$EVENT" | jq -r '.comment.id')" >> "$GITHUB_OUTPUT"
            echo "comment_user=$(echo "$EVENT" | jq -r '.comment.user.login')" >> "$GITHUB_OUTPUT"
            ;;
          repository_dispatch)
            ACTION=$(echo "$EVENT" | jq -r '.action')
            PAYLOAD=$(echo "$EVENT" | jq -r '.client_payload')
            echo "dispatch_action=$ACTION" >> "$GITHUB_OUTPUT"

            # Check for resume event
            if echo "$PAYLOAD" | jq -e '.pr_number and .trigger_result' > /dev/null 2>&1; then
              echo "source=resume" >> "$GITHUB_OUTPUT"
              echo "pr_number=$(echo "$PAYLOAD" | jq -r '.pr_number')" >> "$GITHUB_OUTPUT"
              echo "resume_trigger=$(echo "$PAYLOAD" | jq -r '.trigger_workflow // "unknown"')" >> "$GITHUB_OUTPUT"
              echo "resume_result=$(echo "$PAYLOAD" | jq -r '.trigger_result')" >> "$GITHUB_OUTPUT"
              echo "resume_attempt=$(echo "$PAYLOAD" | jq -r '.attempt // 1')" >> "$GITHUB_OUTPUT"
              echo "resume_workflow_summary=$(echo "$PAYLOAD" | jq -r '.workflow_summary // ""')" >> "$GITHUB_OUTPUT"
              echo "message=Resume: $(echo "$PAYLOAD" | jq -r '.trigger_workflow // "workflow"') completed ($(echo "$PAYLOAD" | jq -r '.trigger_result'))" >> "$GITHUB_OUTPUT"
              # Pass through any extra fields from payload as env vars
              echo "$PAYLOAD" | jq -r 'to_entries[] | select(.key | test("^(pr_number|trigger_workflow|trigger_result|attempt|workflow_summary)$") | not) | "\(.key)=\(.value)"' >> "$GITHUB_OUTPUT" 2>/dev/null || true

            # Check for Slack-like event (has text + channel_id)
            elif echo "$PAYLOAD" | jq -e '.text and .channel_id' > /dev/null 2>&1; then
              echo "source=slack" >> "$GITHUB_OUTPUT"
              echo "message=$(echo "$PAYLOAD" | jq -r '.text')" >> "$GITHUB_OUTPUT"
              echo "slack_channel=$(echo "$PAYLOAD" | jq -r '.channel_id')" >> "$GITHUB_OUTPUT"
              echo "slack_thread_ts=$(echo "$PAYLOAD" | jq -r '.thread_ts // .message_ts // ""')" >> "$GITHUB_OUTPUT"
              echo "slack_message_ts=$(echo "$PAYLOAD" | jq -r '.message_ts // ""')" >> "$GITHUB_OUTPUT"
              # Skip bot messages
              if echo "$PAYLOAD" | jq -e '.bot_id' > /dev/null 2>&1; then
                echo "skip=true" >> "$GITHUB_OUTPUT"
              fi
            # Check for Azure DevOps webhook (has work_item_id + comment_text)
            elif echo "$PAYLOAD" | jq -e '.work_item_id and .comment_text' > /dev/null 2>&1; then
              echo "source=azure-devops" >> "$GITHUB_OUTPUT"
              echo "message=$(echo "$PAYLOAD" | jq -r '.comment_text')" >> "$GITHUB_OUTPUT"
              echo "azdo_work_item_id=$(echo "$PAYLOAD" | jq -r '.work_item_id')" >> "$GITHUB_OUTPUT"
              echo "azdo_comment_id=$(echo "$PAYLOAD" | jq -r '.comment_id // ""')" >> "$GITHUB_OUTPUT"
              echo "azdo_work_item_title=$(echo "$PAYLOAD" | jq -r '.work_item_title // ""')" >> "$GITHUB_OUTPUT"
              echo "azdo_comment_author=$(echo "$PAYLOAD" | jq -r '.comment_author // ""')" >> "$GITHUB_OUTPUT"
              echo "azdo_project=$(echo "$PAYLOAD" | jq -r '.project // ""')" >> "$GITHUB_OUTPUT"
              # Pass remaining payload fields
              echo "$PAYLOAD" | jq -r 'to_entries[] | select(.key | test("^(work_item_id|comment_text|comment_id|work_item_title|comment_author|project)$") | not) | "\(.key)=\(.value)"' >> "$GITHUB_OUTPUT" 2>/dev/null || true

            # Generic webhook event — extract message from common fields
            else
              echo "source=webhook" >> "$GITHUB_OUTPUT"
              MSG=$(echo "$PAYLOAD" | jq -r '.message // .comment_text // .text // .body // "No message"')
              echo "message=$MSG" >> "$GITHUB_OUTPUT"
              # Pass all payload fields as outputs
              echo "$PAYLOAD" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_OUTPUT" 2>/dev/null || true
            fi
            ;;
          workflow_dispatch)
            echo "source=manual" >> "$GITHUB_OUTPUT"
            echo "message=$(echo "$EVENT" | jq -r '.inputs.message // "Hello"')" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "source=unknown" >> "$GITHUB_OUTPUT"
            echo "message=Triggered by $GITHUB_EVENT_NAME" >> "$GITHUB_OUTPUT"
            ;;
        esac

    - name: Early exit for bot messages
      if: steps.source.outputs.skip == 'true'
      shell: bash
      run: |
        echo "::notice::Skipping — bot message detected (prevents infinite loops)"
        exit 0

    # ── 2. Acknowledge receipt ──────────────────────────────────────────
    - name: Acknowledge on GitHub
      if: steps.source.outputs.source == 'github' && steps.source.outputs.skip != 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          await github.rest.reactions.createForIssueComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: ${{ steps.source.outputs.comment_id }},
            content: 'eyes'
          });

    # ── 2b. Acknowledge on Slack ─────────────────────────────────────────
    - name: Acknowledge on Slack
      if: steps.source.outputs.source == 'slack' && steps.source.outputs.skip != 'true'
      shell: bash
      env:
        SLACK_CHANNEL: ${{ steps.source.outputs.slack_channel }}
        SLACK_MESSAGE_TS: ${{ steps.source.outputs.slack_message_ts }}
      run: |
        # SLACK_BOT_TOKEN must be provided via secrets input
        if [ -z "$SLACK_BOT_TOKEN" ]; then
          echo "::warning::No SLACK_BOT_TOKEN — cannot add Slack reaction"
          exit 0
        fi
        if [ -n "$SLACK_MESSAGE_TS" ] && [ "$SLACK_MESSAGE_TS" != "null" ]; then
          curl -s -X POST https://slack.com/api/reactions.add \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"$SLACK_CHANNEL\",\"timestamp\":\"$SLACK_MESSAGE_TS\",\"name\":\"thinking_face\"}" > /dev/null 2>&1 || true
          echo "Added thinking_face reaction on Slack"
        fi

    # ── 2c. Acknowledge on Azure DevOps ──────────────────────────────────
    - name: Acknowledge on Azure DevOps
      if: steps.source.outputs.source == 'azure-devops' && steps.source.outputs.skip != 'true'
      shell: bash
      env:
        AZDO_WORK_ITEM_ID: ${{ steps.source.outputs.azdo_work_item_id }}
        AZDO_COMMENT_ID: ${{ steps.source.outputs.azdo_comment_id }}
      run: |
        # AZURE_DEVOPS_ORG, AZURE_DEVOPS_PROJECT, AZURE_DEVOPS_PAT must be provided via secrets
        if [ -z "$AZURE_DEVOPS_PAT" ] || [ -z "$AZURE_DEVOPS_ORG" ]; then
          echo "::warning::No AZURE_DEVOPS_PAT or ORG — cannot acknowledge on AzDo"
          exit 0
        fi

        AZDO_URL="https://dev.azure.com/$AZURE_DEVOPS_ORG/$AZURE_DEVOPS_PROJECT/_apis/wit/workitems/$AZDO_WORK_ITEM_ID"
        AUTH=$(printf ':'"$AZURE_DEVOPS_PAT" | base64)
        WORKFLOW_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

        # 1. React to the triggering comment
        if [ -n "$AZDO_COMMENT_ID" ] && [ "$AZDO_COMMENT_ID" != "null" ]; then
          curl -sf -X PUT \
            "${AZDO_URL}/comments/${AZDO_COMMENT_ID}/reactions/like?api-version=7.1-preview.1" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" > /dev/null 2>&1 || true
        fi

        # 2. Post "Starting work..." comment
        COMMENT_BODY="<p>🤖 <strong>Starting work...</strong></p><p>Follow progress: <a href=\"${WORKFLOW_URL}\">workflow run</a></p>"
        curl -sf -X POST \
          "${AZDO_URL}/comments?api-version=7.1-preview.4" \
          -H "Authorization: Basic $AUTH" \
          -H "Content-Type: application/json" \
          -d "{\"text\": \"$COMMENT_BODY\"}" > /dev/null 2>&1 || echo "::warning::Failed to post AzDo comment"

        # 3. Set po-agent:in-progress tag
        CURRENT_TAGS=$(curl -sf \
          "${AZDO_URL}?fields=System.Tags&api-version=7.0" \
          -H "Authorization: Basic $AUTH" | jq -r '.fields["System.Tags"] // ""')

        # Strip existing po-agent status tags
        NEW_TAGS=$(echo "$CURRENT_TAGS" | tr ';' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
          grep -vE '^po-agent:(in-progress|waiting-ci|waiting-human|done|failed)$' | \
          tr '\n' ';' | sed 's/;$//')

        # Add in-progress tag and attempt-1 if no attempt tag exists
        NEW_TAGS="${NEW_TAGS:+$NEW_TAGS; }po-agent:in-progress"
        if ! echo "$NEW_TAGS" | grep -q 'po-agent:attempt-'; then
          NEW_TAGS="${NEW_TAGS}; po-agent:attempt-1"
        fi

        curl -sf -X PATCH \
          "${AZDO_URL}?api-version=7.0" \
          -H "Authorization: Basic $AUTH" \
          -H "Content-Type: application/json-patch+json" \
          -d "[{\"op\": \"replace\", \"path\": \"/fields/System.Tags\", \"value\": \"$NEW_TAGS\"}]" > /dev/null 2>&1 || echo "::warning::Failed to update AzDo tags"

    # ── 3. Install Claude Code CLI ──────────────────────────────────────
    - name: Install Claude Code
      if: steps.source.outputs.skip != 'true'
      id: install
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.claude_cli_version }}
      run: |
        # Clean up stale CLI locks
        rm -rf "$HOME/.claude/.locks"

        if command -v claude &> /dev/null; then
          echo "Claude Code already installed: $(claude --version)"
        else
          if [ "$CLI_VERSION" = "latest" ]; then
            curl -fsSL https://claude.ai/install.sh | bash
          else
            curl -fsSL https://claude.ai/install.sh | bash -s -- --version "$CLI_VERSION"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        fi
        export PATH="$HOME/.local/bin:$PATH"
        CLAUDE_PATH="$(which claude)"
        echo "claude_path=$CLAUDE_PATH" >> "$GITHUB_OUTPUT"
        "$CLAUDE_PATH" --version

    # ── 4. Setup Node.js and Playwright ─────────────────────────────────
    - name: Setup Node.js
      if: steps.source.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      if: steps.source.outputs.skip != 'true'
      shell: bash
      run: |
        npx -y playwright install chromium --with-deps 2>/dev/null || {
          npx -y playwright install chromium
          sudo npx -y playwright install-deps chromium 2>/dev/null || true
        }

    # ── 5. Register MCP servers ─────────────────────────────────────────
    - name: Register MCP servers
      if: steps.source.outputs.skip != 'true'
      shell: bash
      env:
        CLAUDE_PATH: ${{ steps.install.outputs.claude_path }}
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        export PATH="$HOME/.local/bin:$PATH"

        "$CLAUDE_PATH" mcp add github \
          --scope user \
          -e GITHUB_PERSONAL_ACCESS_TOKEN="$GH_TOKEN" \
          -- npx -y @modelcontextprotocol/server-github || true

        "$CLAUDE_PATH" mcp add playwright \
          --scope user \
          -- npx -y @playwright/mcp@latest \
            --headless \
            --ignore-https-errors \
            --viewport-size=1920x1080 \
            --save-trace \
            --save-video=1920x1080 \
            --output-dir=/tmp/playwright-artifacts || true

        # Register Azure DevOps MCP server if credentials available
        if [ -n "$AZURE_DEVOPS_PAT" ] && [ -n "$AZURE_DEVOPS_ORG" ]; then
          "$CLAUDE_PATH" mcp add azure-devops \
            --scope user \
            -e AZURE_DEVOPS_ORG="$AZURE_DEVOPS_ORG" \
            -e AZURE_DEVOPS_AUTH_METHOD=pat \
            -e AZURE_DEVOPS_PAT="$AZURE_DEVOPS_PAT" \
            -e AZURE_DEVOPS_DEFAULT_PROJECT="${AZURE_DEVOPS_PROJECT:-}" \
            -- npx -y @tiberriver256/mcp-server-azure-devops || true
          echo "Registered Azure DevOps MCP server"
        fi

        # Register Notion MCP server if API key available
        if [ -n "$NOTION_API_KEY" ]; then
          "$CLAUDE_PATH" mcp add notion \
            --scope user \
            -e OPENAPI_MCP_HEADERS="{\"Authorization\": \"Bearer $NOTION_API_KEY\", \"Notion-Version\": \"2022-06-28\"}" \
            -- npx -y @notionhq/notion-mcp-server || true
          echo "Registered Notion MCP server"
        fi

        "$CLAUDE_PATH" mcp list || true

    # ── 6. Link skills and scripts ──────────────────────────────────────
    - name: Setup skills and scripts
      if: steps.source.outputs.skip != 'true'
      shell: bash
      run: |
        ACTION_DIR="${{ github.action_path }}"
        WORKSPACE="$GITHUB_WORKSPACE"
        mkdir -p "$WORKSPACE/.claude/skills"

        echo "=== Linking PO Agent skills ==="

        # Link framework default skills (skip if consumer has override in .po-agent/skills/)
        if [ -d "$ACTION_DIR/skills" ]; then
          for skill_dir in "$ACTION_DIR"/skills/*/; do
            [ ! -d "$skill_dir" ] && continue
            skill_name=$(basename "$skill_dir")
            if [ -d "$WORKSPACE/.po-agent/skills/$skill_name" ]; then
              echo "SKIP (override): $skill_name"
            else
              ln -sf "$skill_dir" "$WORKSPACE/.claude/skills/$skill_name"
              echo "LINK (framework): $skill_name"
            fi
          done
        fi

        # Link consumer skills from .po-agent/skills/
        if [ -d "$WORKSPACE/.po-agent/skills" ]; then
          for skill_dir in "$WORKSPACE"/.po-agent/skills/*/; do
            [ ! -d "$skill_dir" ] && continue
            skill_name=$(basename "$skill_dir")
            ln -sf "$skill_dir" "$WORKSPACE/.claude/skills/$skill_name"
            echo "LINK (consumer):  $skill_name"
          done
        fi

        echo ""
        echo "=== Active skills ==="
        ls "$WORKSPACE/.claude/skills/" 2>/dev/null || echo "(none)"

        # Link scripts to PATH
        if [ -d "$ACTION_DIR/scripts" ]; then
          for script in "$ACTION_DIR"/scripts/*.sh; do
            [ ! -f "$script" ] && continue
            chmod +x "$script"
            name=$(basename "$script" .sh)
            sudo ln -sf "$script" "/usr/local/bin/$name"
            echo "SCRIPT: $name"
          done
        fi

    # ── 7. Export secrets as environment variables ──────────────────────
    - name: Export secrets
      if: steps.source.outputs.skip != 'true'
      shell: bash
      env:
        SECRETS_INPUT: ${{ inputs.secrets }}
      run: |
        if [ -n "$SECRETS_INPUT" ]; then
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            [[ "$line" == \#* ]] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<< "$SECRETS_INPUT"
          echo "Exported secrets to environment"
        fi

    # ── 8. Fetch context ────────────────────────────────────────────────
    - name: Fetch context
      if: steps.source.outputs.skip != 'true'
      id: context
      shell: bash
      env:
        SOURCE: ${{ steps.source.outputs.source }}
        PR_NUMBER: ${{ steps.source.outputs.pr_number }}
        GH_TOKEN: ${{ inputs.github_token }}
        SLACK_BOT_TOKEN_ENV: ${{ steps.source.outputs.slack_bot_token }}
        SLACK_CHANNEL: ${{ steps.source.outputs.slack_channel }}
        SLACK_THREAD_TS: ${{ steps.source.outputs.slack_thread_ts }}
        AZDO_WORK_ITEM_ID: ${{ steps.source.outputs.azdo_work_item_id }}
      run: |
        CONTEXT_FILE="/tmp/conversation_context.txt"
        touch "$CONTEXT_FILE"

        # Helper: fetch AzDo work item context
        fetch_azdo_work_item() {
          local WI_ID="$1"
          local PREFIX="${2:-}"
          if [ -z "$AZURE_DEVOPS_PAT" ] || [ -z "$AZURE_DEVOPS_ORG" ] || [ -z "$WI_ID" ]; then
            return
          fi

          local AUTH=$(printf ':'"$AZURE_DEVOPS_PAT" | base64)
          local AZDO_URL="https://dev.azure.com/$AZURE_DEVOPS_ORG/$AZURE_DEVOPS_PROJECT/_apis/wit/workitems/$WI_ID"

          local WI=$(curl -sf "${AZDO_URL}?\$expand=relations&api-version=7.0" \
            -H "Authorization: Basic $AUTH" 2>/dev/null || echo "{}")

          if [ "$WI" = "{}" ]; then
            echo "${PREFIX}(Could not fetch work item #$WI_ID)" >> "$CONTEXT_FILE"
            return
          fi

          local WI_TYPE=$(echo "$WI" | jq -r '.fields["System.WorkItemType"] // "Unknown"')
          local WI_TITLE=$(echo "$WI" | jq -r '.fields["System.Title"] // "N/A"')
          local WI_STATE=$(echo "$WI" | jq -r '.fields["System.State"] // "N/A"')
          local WI_ASSIGNED=$(echo "$WI" | jq -r '.fields["System.AssignedTo"].displayName // "Unassigned"')
          local WI_DESC=$(echo "$WI" | jq -r '.fields["System.Description"] // ""' | head -c 3000)
          local WI_REPRO=$(echo "$WI" | jq -r '.fields["Microsoft.VSTS.TCM.ReproSteps"] // ""' | head -c 2000)
          local WI_AC=$(echo "$WI" | jq -r '.fields["Microsoft.VSTS.Common.AcceptanceCriteria"] // ""' | head -c 2000)
          local WI_TENANT=$(echo "$WI" | jq -r '.fields["Custom.Tenant"] // ""')
          local WI_URL_FIELD=$(echo "$WI" | jq -r '.fields["Custom.URL"] // ""')

          echo "${PREFIX}=== Azure DevOps Work Item #$WI_ID ===" >> "$CONTEXT_FILE"
          echo "${PREFIX}**Type:** $WI_TYPE | **Title:** $WI_TITLE" >> "$CONTEXT_FILE"
          echo "${PREFIX}**State:** $WI_STATE | **Assigned:** $WI_ASSIGNED" >> "$CONTEXT_FILE"
          [ -n "$WI_TENANT" ] && echo "${PREFIX}**Tenant:** $WI_TENANT" >> "$CONTEXT_FILE"
          [ -n "$WI_URL_FIELD" ] && echo "${PREFIX}**URL:** $WI_URL_FIELD" >> "$CONTEXT_FILE"
          echo "" >> "$CONTEXT_FILE"

          if [ -n "$WI_DESC" ]; then
            echo "${PREFIX}**Description:**" >> "$CONTEXT_FILE"
            echo "$WI_DESC" | sed 's/<[^>]*>//g' >> "$CONTEXT_FILE"
            echo "" >> "$CONTEXT_FILE"
          fi
          if [ "$WI_TYPE" = "Bug" ] && [ -n "$WI_REPRO" ]; then
            echo "${PREFIX}**Repro Steps:**" >> "$CONTEXT_FILE"
            echo "$WI_REPRO" | sed 's/<[^>]*>//g' >> "$CONTEXT_FILE"
            echo "" >> "$CONTEXT_FILE"
          fi
          if [ -n "$WI_AC" ]; then
            echo "${PREFIX}**Acceptance Criteria:**" >> "$CONTEXT_FILE"
            echo "$WI_AC" | sed 's/<[^>]*>//g' >> "$CONTEXT_FILE"
            echo "" >> "$CONTEXT_FILE"
          fi

          # Fetch recent comments (last 15)
          local COMMENTS=$(curl -sf \
            "${AZDO_URL}/comments?api-version=7.1-preview.4&\$top=15&order=desc" \
            -H "Authorization: Basic $AUTH" 2>/dev/null || echo '{"comments":[]}')

          local COMMENT_COUNT=$(echo "$COMMENTS" | jq '.comments | length')
          if [ "$COMMENT_COUNT" -gt 0 ]; then
            echo "${PREFIX}**Recent Comments:**" >> "$CONTEXT_FILE"
            echo "$COMMENTS" | jq -r '.comments | reverse | .[] | "- " + (.createdBy.displayName // "unknown") + ": " + (.text | gsub("<[^>]*>"; "") | split("\n")[0] // "")' 2>/dev/null | tail -15 >> "$CONTEXT_FILE"
            echo "" >> "$CONTEXT_FILE"
          fi

          # Check for attachments
          local ATTACHMENTS=$(echo "$WI" | jq -r '.relations // [] | map(select(.rel == "AttachedFile")) | .[]? | .url' 2>/dev/null)
          if [ -n "$ATTACHMENTS" ]; then
            echo "${PREFIX}**Attachments:** (use \`/azure-attachments\` CLI to view — NEVER raw curl)" >> "$CONTEXT_FILE"
            echo "$ATTACHMENTS" | while read -r url; do
              local FNAME=$(echo "$url" | grep -oP '[^/]+$' | sed 's/%20/ /g')
              echo "  - $FNAME" >> "$CONTEXT_FILE"
            done
            echo "" >> "$CONTEXT_FILE"
          fi
        }

        # Helper: detect linked work item ID from text
        detect_work_item_id() {
          echo "$1" | grep -oP '(?:AB#|VYZN-|_workitems/edit/)(\d+)' | head -1 | grep -oP '\d+'
        }

        case "$SOURCE" in
          azure-devops)
            fetch_azdo_work_item "$AZDO_WORK_ITEM_ID"
            ;;

          github|resume)
            if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
              echo "=== Pull Request #$PR_NUMBER ===" > "$CONTEXT_FILE"
              PR_DATA=$(gh pr view "$PR_NUMBER" --json title,body,headRefName,baseRefName,files,comments 2>/dev/null || echo "{}")
              if [ "$PR_DATA" != "{}" ]; then
                echo "**Title:** $(echo "$PR_DATA" | jq -r '.title // "N/A"')" >> "$CONTEXT_FILE"
                echo "**Branch:** $(echo "$PR_DATA" | jq -r '.headRefName // "?"') → $(echo "$PR_DATA" | jq -r '.baseRefName // "?"')" >> "$CONTEXT_FILE"
                echo "" >> "$CONTEXT_FILE"
                echo "**Description:**" >> "$CONTEXT_FILE"
                echo "$PR_DATA" | jq -r '.body // "No description"' >> "$CONTEXT_FILE"
                echo "" >> "$CONTEXT_FILE"
                echo "**Changed Files:**" >> "$CONTEXT_FILE"
                echo "$PR_DATA" | jq -r '.files[].path' 2>/dev/null | head -20 >> "$CONTEXT_FILE"
                echo "" >> "$CONTEXT_FILE"
                echo "**Recent Comments:**" >> "$CONTEXT_FILE"
                echo "$PR_DATA" | jq -r '.comments[-5:]? // [] | .[]? | "- \(.author.login // "unknown"): \(.body | split("\n")[0] // "")"' >> "$CONTEXT_FILE" 2>/dev/null || true

                # Check for linked AzDo work item from PR title, body, branch name
                PR_TITLE=$(echo "$PR_DATA" | jq -r '.title // ""')
                PR_BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
                PR_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName // ""')
                LINKED_WI=$(detect_work_item_id "$PR_TITLE $PR_BODY $PR_BRANCH")
                if [ -n "$LINKED_WI" ]; then
                  echo "" >> "$CONTEXT_FILE"
                  echo "--- Linked Work Item ---" >> "$CONTEXT_FILE"
                  fetch_azdo_work_item "$LINKED_WI"
                  echo "azdo_work_item_id=$LINKED_WI" >> "$GITHUB_OUTPUT"
                fi
              fi
            fi
            ;;
          slack)
            # Fetch thread history if Slack bot token is available
            if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_THREAD_TS" ]; then
              RESPONSE=$(curl -s "https://slack.com/api/conversations.replies" \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -G \
                --data-urlencode "channel=$SLACK_CHANNEL" \
                --data-urlencode "ts=$SLACK_THREAD_TS" \
                --data-urlencode "limit=20" 2>/dev/null)

              if echo "$RESPONSE" | jq -e '.ok == true' > /dev/null 2>&1; then
                echo "=== Slack Thread History ===" > "$CONTEXT_FILE"
                echo "$RESPONSE" | jq -r '
                  .messages |
                  to_entries |
                  map(
                    if .value.bot_id then "Assistant: " + .value.text
                    else "User: " + .value.text end
                  ) | join("\n\n")
                ' >> "$CONTEXT_FILE"

                # Check for linked AzDo work item from thread text
                THREAD_TEXT=$(echo "$RESPONSE" | jq -r '.messages[].text' 2>/dev/null | tr '\n' ' ')
                LINKED_WI=$(detect_work_item_id "$THREAD_TEXT")
                if [ -n "$LINKED_WI" ]; then
                  echo "" >> "$CONTEXT_FILE"
                  echo "--- Linked Work Item ---" >> "$CONTEXT_FILE"
                  fetch_azdo_work_item "$LINKED_WI"
                  echo "azdo_work_item_id=$LINKED_WI" >> "$GITHUB_OUTPUT"
                fi
              fi
            fi
            ;;
        esac

        # Add resume context
        if [ "$SOURCE" == "resume" ]; then
          echo "" >> "$CONTEXT_FILE"
          echo "=== RESUME CONTEXT ===" >> "$CONTEXT_FILE"
          echo "You are **resuming** work on PR #$PR_NUMBER." >> "$CONTEXT_FILE"
          echo "Trigger: ${{ steps.source.outputs.resume_trigger }} — Result: **${{ steps.source.outputs.resume_result }}**" >> "$CONTEXT_FILE"
          SUMMARY="${{ steps.source.outputs.resume_workflow_summary }}"
          [ -n "$SUMMARY" ] && echo "Workflow results: $SUMMARY" >> "$CONTEXT_FILE"
          echo "Attempt ${{ steps.source.outputs.resume_attempt }}." >> "$CONTEXT_FILE"
          echo "=== END RESUME CONTEXT ===" >> "$CONTEXT_FILE"
        fi

        if [ -s "$CONTEXT_FILE" ]; then
          echo "has_context=true" >> "$GITHUB_OUTPUT"
        fi

    # ── 9. Compose prompt and run agent ─────────────────────────────────
    - name: Run PO Agent
      if: steps.source.outputs.skip != 'true'
      id: run-agent
      shell: bash
      env:
        CLAUDE_PATH: ${{ steps.install.outputs.claude_path }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        ANTHROPIC_MODEL: ${{ inputs.model }}
        MAX_BUDGET: ${{ inputs.max_budget_usd }}
        SOURCE: ${{ steps.source.outputs.source }}
        USER_MESSAGE: ${{ steps.source.outputs.message }}
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        ACTION_DIR="${{ github.action_path }}"

        # Build system prompt
        cp "$ACTION_DIR/prompts/core.md" /tmp/prompt.txt

        # Add source-specific prompt
        SOURCE_PROMPT="$ACTION_DIR/prompts/source-${SOURCE}.md"
        if [ -f "$SOURCE_PROMPT" ]; then
          echo "" >> /tmp/prompt.txt
          echo "---" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          cat "$SOURCE_PROMPT" >> /tmp/prompt.txt
        fi

        # Add context
        if [ -f /tmp/conversation_context.txt ] && [ -s /tmp/conversation_context.txt ]; then
          echo "" >> /tmp/prompt.txt
          echo "=== Context ===" >> /tmp/prompt.txt
          cat /tmp/conversation_context.txt >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "=== End of context ===" >> /tmp/prompt.txt
        fi

        # Add user message
        echo "" >> /tmp/prompt.txt
        echo "User message:" >> /tmp/prompt.txt
        echo "$USER_MESSAGE" >> /tmp/prompt.txt

        # Create artifacts directory
        mkdir -p /tmp/agent-artifacts/{screenshots,transcripts}

        # Run Claude Code
        echo "=== Running PO Agent (source: $SOURCE, budget: \$$MAX_BUDGET) ==="

        "$CLAUDE_PATH" --print \
          --verbose \
          --dangerously-skip-permissions \
          --max-budget-usd "$MAX_BUDGET" \
          --output-format stream-json \
          "$(cat /tmp/prompt.txt)" 2>&1 | tee /tmp/agent-artifacts/transcripts/transcript.jsonl || true

        # Extract result from stream-json
        RESULT_LINE=$(grep '"type":"result"' /tmp/agent-artifacts/transcripts/transcript.jsonl 2>/dev/null | tail -1)

        if [ -n "$RESULT_LINE" ]; then
          echo "$RESULT_LINE" > /tmp/agent_raw.json

          SUBTYPE=$(echo "$RESULT_LINE" | jq -r '.subtype // ""')
          COST_USD=$(echo "$RESULT_LINE" | jq -r '.total_cost_usd // 0')

          if [ "$SUBTYPE" == "error_max_budget_usd" ]; then
            NUM_TURNS=$(echo "$RESULT_LINE" | jq -r '.num_turns // 0')
            SESSION_ID=$(echo "$RESULT_LINE" | jq -r '.session_id // "N/A"')
            DURATION_SECS=$(echo "$RESULT_LINE" | jq -r '.duration_ms // 0' | awk '{printf "%.0f", $1/1000}')
            DURATION_MINS=$(echo "$DURATION_SECS" | awk '{printf "%.1f", $1/60}')

            # Extract tool usage summary from transcript
            TOOL_SUMMARY=""
            if [ -f /tmp/agent-artifacts/transcripts/transcript.jsonl ]; then
              TOOL_SUMMARY=$(jq -r 'select(.type == "tool_use") | .name // empty' /tmp/agent-artifacts/transcripts/transcript.jsonl 2>/dev/null | sort | uniq -c | sort -rn | head -10 | awk '{printf "  - `%s`: %s calls\n", $2, $1}' || true)
              FILES_READ=$(jq -r 'select(.type == "tool_use") | select(.name == "Read" or .name == "read_file") | .input.file_path // .input.path // empty' /tmp/agent-artifacts/transcripts/transcript.jsonl 2>/dev/null | sort -u | head -20 | awk '{printf "  - `%s`\n", $0}' || true)
            fi

            {
              printf "⚠️ **Budget Limit Reached**\n\n"
              printf "The agent was working but hit the budget limit before completing.\n\n"
              printf "### Session Stats\n"
              printf "| Metric | Value |\n|---|---|\n"
              printf "| 💰 Cost | \$%s USD (limit: \$%s) |\n" "$COST_USD" "$MAX_BUDGET"
              printf "| 🔄 Turns | %s |\n" "$NUM_TURNS"
              printf "| ⏱️ Duration | %s min |\n" "$DURATION_MINS"
              printf "| 🆔 Session | \`%s\` |\n" "$SESSION_ID"
              if [ -n "$TOOL_SUMMARY" ]; then
                printf "\n### Tool Usage\n%s\n" "$TOOL_SUMMARY"
              fi
              if [ -n "$FILES_READ" ]; then
                printf "\n### Files Read\n%s\n" "$FILES_READ"
              fi
              printf "\n> 💡 Increase \`max_budget_usd\` or break the task into smaller requests."
            } > /tmp/agent_output.txt
          else
            echo "$RESULT_LINE" | jq -r '.result // ""' > /tmp/agent_output.txt

            # Handle empty result — attempt session resume
            RESULT_LEN=$(wc -c < /tmp/agent_output.txt | tr -d ' ')
            if [ "$RESULT_LEN" -lt 10 ]; then
              SESSION_ID=$(echo "$RESULT_LINE" | jq -r '.session_id // ""')
              if [ -n "$SESSION_ID" ] && [ "$SESSION_ID" != "null" ]; then
                echo "::warning::Empty result — resuming session $SESSION_ID"
                "$CLAUDE_PATH" --print \
                  --verbose \
                  --dangerously-skip-permissions \
                  --max-budget-usd 3.0 \
                  --output-format stream-json \
                  --resume "$SESSION_ID" \
                  "The previous response was empty. Please provide your response." \
                  2>&1 | tee -a /tmp/agent-artifacts/transcripts/transcript.jsonl || true

                RESUME_RESULT=$(grep '"type":"result"' /tmp/agent-artifacts/transcripts/transcript.jsonl | tail -1)
                if [ -n "$RESUME_RESULT" ]; then
                  RESUME_TEXT=$(echo "$RESUME_RESULT" | jq -r '.result // ""')
                  RESUME_COST=$(echo "$RESUME_RESULT" | jq -r '.total_cost_usd // 0')
                  if [ ${#RESUME_TEXT} -ge 10 ]; then
                    echo "$RESUME_TEXT" > /tmp/agent_output.txt
                    COST_USD=$(awk "BEGIN {printf \"%.4f\", $COST_USD + $RESUME_COST}")
                  fi
                fi
              fi
            fi
          fi

          echo "cost_usd=$COST_USD" >> "$GITHUB_OUTPUT"
        else
          echo "The agent did not produce a result. Check workflow logs." > /tmp/agent_output.txt
        fi

        # Store response for output
        RESPONSE=$(cat /tmp/agent_output.txt 2>/dev/null || echo "No output")
        echo "response<<RESPONSE_EOF" >> "$GITHUB_OUTPUT"
        echo "$RESPONSE" >> "$GITHUB_OUTPUT"
        echo "RESPONSE_EOF" >> "$GITHUB_OUTPUT"

    # ── 10. Finalize Playwright ─────────────────────────────────────────
    - name: Finalize Playwright recordings
      if: always() && steps.source.outputs.skip != 'true'
      shell: bash
      run: |
        pkill -f "@playwright/mcp" 2>/dev/null || true
        sleep 2
        # Ensure all video files are flushed
        sync 2>/dev/null || true

    # ── 11. Upload artifacts ────────────────────────────────────────────
    - name: Upload agent artifacts
      if: always() && steps.source.outputs.skip != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: po-agent-artifacts
        path: |
          /tmp/agent-artifacts/
          /tmp/playwright-artifacts/
        if-no-files-found: ignore
        retention-days: 7

    # ── 11b. Catalog artifacts and embed references in response ────────
    - name: Embed artifact references in response
      if: always() && steps.source.outputs.skip != 'true'
      id: embed-artifacts
      shell: bash
      env:
        SOURCE: ${{ steps.source.outputs.source }}
      run: |
        ACTION_DIR="${{ github.action_path }}"

        # Run the upload-artifacts catalog script
        if [ -x "$ACTION_DIR/scripts/upload-artifacts.sh" ]; then
          bash "$ACTION_DIR/scripts/upload-artifacts.sh" || true
        fi

        MANIFEST="/tmp/artifact-urls.json"
        if [ ! -f "$MANIFEST" ] || [ "$(jq '.artifacts | length' "$MANIFEST" 2>/dev/null)" = "0" ]; then
          echo "No artifacts to embed"
          exit 0
        fi

        ARTIFACT_COUNT=$(jq '.artifacts | length' "$MANIFEST")
        echo "Embedding $ARTIFACT_COUNT artifact(s) for source: $SOURCE"

        ARTIFACT_BLOCK=""
        RUN_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        ARTIFACT_DL_URL="$RUN_URL#artifacts"

        case "$SOURCE" in
          github|resume)
            # For GitHub: embed images inline, link videos
            ARTIFACT_BLOCK=$'\n\n---\n📎 **Artifacts**\n'
            while IFS= read -r artifact; do
              FILENAME=$(echo "$artifact" | jq -r '.filename')
              TYPE=$(echo "$artifact" | jq -r '.type')
              case "$TYPE" in
                image)
                  # GitHub PR comments don't support direct artifact images,
                  # but we can reference them in the artifacts download
                  ARTIFACT_BLOCK+=$'\n'"- 🖼️ \`$FILENAME\` — [download from artifacts]($ARTIFACT_DL_URL)"
                  ;;
                video)
                  ARTIFACT_BLOCK+=$'\n'"- 🎬 \`$FILENAME\` — [download from artifacts]($ARTIFACT_DL_URL)"
                  ;;
                *)
                  ARTIFACT_BLOCK+=$'\n'"- 📄 \`$FILENAME\` — [download from artifacts]($ARTIFACT_DL_URL)"
                  ;;
              esac
            done < <(jq -c '.artifacts[]' "$MANIFEST")
            ;;
          slack)
            # For Slack: add file links
            ARTIFACT_BLOCK=$'\n\n📎 *Artifacts*\n'
            while IFS= read -r artifact; do
              FILENAME=$(echo "$artifact" | jq -r '.filename')
              TYPE=$(echo "$artifact" | jq -r '.type')
              ARTIFACT_BLOCK+="• \`$FILENAME\` ($TYPE) — <$ARTIFACT_DL_URL|download>"$'\n'
            done < <(jq -c '.artifacts[]' "$MANIFEST")
            ;;
          azure-devops)
            # For AzDo: HTML formatted artifact list
            ARTIFACT_BLOCK=$'\n\n---\n📎 **Artifacts**\n'
            while IFS= read -r artifact; do
              FILENAME=$(echo "$artifact" | jq -r '.filename')
              TYPE=$(echo "$artifact" | jq -r '.type')
              ARTIFACT_BLOCK+=$'\n'"- \`$FILENAME\` ($TYPE) — [download from artifacts]($ARTIFACT_DL_URL)"
            done < <(jq -c '.artifacts[]' "$MANIFEST")
            ;;
        esac

        if [ -n "$ARTIFACT_BLOCK" ] && [ -f /tmp/agent_output.txt ]; then
          echo "$ARTIFACT_BLOCK" >> /tmp/agent_output.txt
          echo "Artifact references appended to response"
        fi

    # ── 12. Post response ───────────────────────────────────────────────
    - name: Post response to GitHub PR
      if: always() && (steps.source.outputs.source == 'github' || steps.source.outputs.source == 'resume') && steps.source.outputs.skip != 'true'
      uses: actions/github-script@v7
      env:
        COST_USD: ${{ steps.run-agent.outputs.cost_usd }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          let response = '';
          try {
            response = fs.readFileSync('/tmp/agent_output.txt', 'utf8').slice(-10000);
          } catch (e) {
            response = 'The agent did not produce output. Check workflow logs.';
          }

          const costUsd = process.env.COST_USD;
          const costLine = costUsd && costUsd !== '0' ? `\n_LLM Cost: ~${costUsd} USD_` : '';
          const source = '${{ steps.source.outputs.source }}';
          const prNumber = parseInt('${{ steps.source.outputs.pr_number }}');

          if (!prNumber || isNaN(prNumber)) {
            console.log('No PR number — skipping comment');
            return;
          }

          // Add completion reaction to original comment
          const commentId = parseInt('${{ steps.source.outputs.comment_id }}');
          if (commentId && !isNaN(commentId) && source === 'github') {
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              content: 'rocket'
            }).catch(() => {});
          }

          const commentUser = '${{ steps.source.outputs.comment_user }}';
          const mention = commentUser ? `@${commentUser}\n\n` : '';
          const resumeLabel = source === 'resume'
            ? `## 🔄 Resume (Attempt ${{ steps.source.outputs.resume_attempt }})\n\n`
            : '';

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: `${resumeLabel}${mention}${response}\n\n---\n*🤖 [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*${costLine}`
          });

    - name: Post response to Slack
      if: always() && steps.source.outputs.source == 'slack' && steps.source.outputs.skip != 'true'
      shell: bash
      env:
        COST_USD: ${{ steps.run-agent.outputs.cost_usd }}
        SLACK_CHANNEL: ${{ steps.source.outputs.slack_channel }}
        SLACK_THREAD_TS: ${{ steps.source.outputs.slack_message_ts }}
      run: |
        # SLACK_BOT_TOKEN must be provided via secrets input
        if [ -z "$SLACK_BOT_TOKEN" ]; then
          echo "::warning::No SLACK_BOT_TOKEN — cannot post to Slack"
          exit 0
        fi

        RESPONSE=$(cat /tmp/agent_output.txt 2>/dev/null | tail -c 3000 || echo "No output")

        if [ -n "$COST_USD" ] && [ "$COST_USD" != "0" ]; then
          RESPONSE=$(printf "%s\n\n---\n_LLM Cost: ~%s USD_" "$RESPONSE" "$COST_USD")
        fi

        RESPONSE_ESCAPED=$(printf '%s' "$RESPONSE" | jq -Rs .)

        curl -s -X POST https://slack.com/api/chat.postMessage \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"channel\": \"$SLACK_CHANNEL\",
            \"thread_ts\": \"$SLACK_THREAD_TS\",
            \"text\": $RESPONSE_ESCAPED
          }" | jq .ok

        # Update reactions
        if [ -n "$SLACK_THREAD_TS" ]; then
          curl -s -X POST https://slack.com/api/reactions.remove \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"$SLACK_CHANNEL\",\"timestamp\":\"$SLACK_THREAD_TS\",\"name\":\"thinking_face\"}" > /dev/null 2>&1
          curl -s -X POST https://slack.com/api/reactions.add \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"$SLACK_CHANNEL\",\"timestamp\":\"$SLACK_THREAD_TS\",\"name\":\"white_check_mark\"}" > /dev/null 2>&1
        fi

    - name: Post response to Azure DevOps
      if: always() && (steps.source.outputs.source == 'azure-devops' || steps.source.outputs.azdo_work_item_id != '') && steps.source.outputs.skip != 'true'
      shell: bash
      env:
        SOURCE: ${{ steps.source.outputs.source }}
        COST_USD: ${{ steps.run-agent.outputs.cost_usd }}
        AZDO_WORK_ITEM_ID: ${{ steps.source.outputs.azdo_work_item_id }}
        RESUME_ATTEMPT: ${{ steps.source.outputs.resume_attempt }}
      run: |
        if [ -z "$AZURE_DEVOPS_PAT" ] || [ -z "$AZURE_DEVOPS_ORG" ] || [ -z "$AZDO_WORK_ITEM_ID" ]; then
          echo "No AzDo credentials or work item ID — skipping"
          exit 0
        fi

        AUTH=$(printf ':'"$AZURE_DEVOPS_PAT" | base64)
        AZDO_URL="https://dev.azure.com/$AZURE_DEVOPS_ORG/$AZURE_DEVOPS_PROJECT/_apis/wit/workitems/$AZDO_WORK_ITEM_ID"
        WORKFLOW_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

        # Read response
        RESPONSE=""
        if [ -f /tmp/agent_output.txt ]; then
          RESPONSE=$(head -c 50000 /tmp/agent_output.txt 2>/dev/null || true)
        fi
        [ -z "$RESPONSE" ] && RESPONSE="Sorry, I was unable to complete the task. Please check the [workflow logs]($WORKFLOW_URL)."

        # Append footer
        FOOTER="🤖 [workflow run]($WORKFLOW_URL)"
        [ -n "$COST_USD" ] && [ "$COST_USD" != "0" ] && FOOTER="$FOOTER | _LLM Cost: ~$COST_USD USD_"
        RESPONSE=$(printf "%s\n\n---\n%s" "$RESPONSE" "$FOOTER")

        # Add resume header if applicable
        if [ "$SOURCE" = "resume" ] && [ -n "$RESUME_ATTEMPT" ]; then
          RESPONSE=$(printf "## 🔄 Resume (Attempt %s)\n\n%s" "$RESUME_ATTEMPT" "$RESPONSE")
        fi

        # Convert markdown → HTML
        RESPONSE_HTML=""
        if command -v npx &>/dev/null; then
          RESPONSE_HTML=$(printf '%s' "$RESPONSE" | npx --yes marked@latest --gfm --breaks 2>/dev/null || true)
        fi
        if [ -z "$RESPONSE_HTML" ]; then
          # Fallback: basic HTML escaping
          RESPONSE_HTML=$(printf '%s' "$RESPONSE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/$/\<br\>/g')
        fi

        # Post comment to work item
        COMMENT_JSON=$(jq -n --arg text "$RESPONSE_HTML" '{text: $text}')
        curl -sf --http1.1 -X POST \
          "${AZDO_URL}/comments?api-version=7.1-preview.4" \
          -H "Authorization: Basic $AUTH" \
          -H "Content-Type: application/json" \
          -d "$COMMENT_JSON" > /dev/null 2>&1 || echo "::warning::Failed to post response to AzDo"

        # Detect status from response and update tags
        WAITING_TOKEN='<!-- WAITING_FOR_HUMAN -->'
        if echo "$RESPONSE" | grep -q "$WAITING_TOKEN"; then
          NEW_STATUS="waiting-human"
        elif echo "$RESPONSE" | grep -qiE "Created pull request|pushed|PR #[0-9]+|git push|the push was|body .?pr preview"; then
          NEW_STATUS="waiting-ci"
        elif [ -z "$RESPONSE" ] || [ ${#RESPONSE} -lt 10 ]; then
          NEW_STATUS="failed"
        else
          NEW_STATUS="done"
        fi

        # Update tags on work item
        CURRENT_TAGS=$(curl -sf \
          "${AZDO_URL}?fields=System.Tags&api-version=7.0" \
          -H "Authorization: Basic $AUTH" | jq -r '.fields["System.Tags"] // ""')

        NEW_TAGS=$(echo "$CURRENT_TAGS" | tr ';' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
          grep -vE '^po-agent:(in-progress|waiting-ci|waiting-human|done|failed)$' | \
          tr '\n' ';' | sed 's/;$//')
        NEW_TAGS="${NEW_TAGS:+$NEW_TAGS; }po-agent:$NEW_STATUS"

        curl -sf -X PATCH \
          "${AZDO_URL}?api-version=7.0" \
          -H "Authorization: Basic $AUTH" \
          -H "Content-Type: application/json-patch+json" \
          -d "[{\"op\": \"replace\", \"path\": \"/fields/System.Tags\", \"value\": \"$NEW_TAGS\"}]" > /dev/null 2>&1 || echo "::warning::Failed to update AzDo tags"

        echo "AzDo response posted, status: $NEW_STATUS"

    # ── 13. Job Summary ──────────────────────────────────────────────────
    - name: Write job summary
      if: always() && steps.source.outputs.skip != 'true'
      shell: bash
      env:
        SOURCE: ${{ steps.source.outputs.source }}
        MESSAGE: ${{ steps.source.outputs.message }}
        COST_USD: ${{ steps.run-agent.outputs.cost_usd }}
      run: |
        RESPONSE_PREVIEW=""
        if [ -f /tmp/agent_output.txt ]; then
          RESPONSE_PREVIEW=$(head -c 500 /tmp/agent_output.txt 2>/dev/null || echo "N/A")
        fi

        cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY_EOF
        ## 🤖 PO Agent Run

        | Field | Value |
        |---|---|
        | **Source** | \`$SOURCE\` |
        | **Message** | $(echo "$MESSAGE" | head -c 200) |
        | **Cost** | \$${COST_USD:-0} USD |
        | **Run** | [View logs](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID) |

        ### Response Preview
        \`\`\`
        ${RESPONSE_PREVIEW:-No output}
        \`\`\`
        SUMMARY_EOF

    # ── 14. Cancellation handling ────────────────────────────────────────
    - name: Handle cancellation
      if: cancelled()
      shell: bash
      env:
        SOURCE: ${{ steps.source.outputs.source }}
        PR_NUMBER: ${{ steps.source.outputs.pr_number }}
        SLACK_CHANNEL: ${{ steps.source.outputs.slack_channel }}
        SLACK_MESSAGE_TS: ${{ steps.source.outputs.slack_message_ts }}
        GH_TOKEN: ${{ inputs.github_token }}
        AZDO_WORK_ITEM_ID: ${{ steps.source.outputs.azdo_work_item_id }}
      run: |
        CANCEL_MSG="⚠️ **PO Agent run was cancelled.**"
        PARTIAL=""
        if [ -f /tmp/agent_output.txt ]; then
          PARTIAL=$(tail -c 1000 /tmp/agent_output.txt 2>/dev/null || true)
        fi

        if [ -n "$PARTIAL" ]; then
          CANCEL_MSG="$CANCEL_MSG"$'\n\n'"**Partial output:**"$'\n'"$PARTIAL"
        fi

        # Save partial output for debugging
        echo "$CANCEL_MSG" > /tmp/agent_cancelled.txt

        cat >> "$GITHUB_STEP_SUMMARY" <<CANCEL_EOF
        ## ⚠️ PO Agent Cancelled

        The workflow was cancelled before the agent could complete.

        | Field | Value |
        |---|---|
        | **Source** | \`$SOURCE\` |
        | **Partial output** | $(echo "$PARTIAL" | head -c 200 || echo "None") |
        CANCEL_EOF

        # Post cancellation notice to source
        case "$SOURCE" in
          github|resume)
            if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
              gh pr comment "$PR_NUMBER" --body "$CANCEL_MSG"$'\n\n'"---"$'\n'"*🤖 [cancelled run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)*" || true
            fi
            ;;
          slack)
            if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_MESSAGE_TS" ]; then
              ESCAPED=$(printf '%s' "$CANCEL_MSG" | jq -Rs .)
              curl -s -X POST https://slack.com/api/chat.postMessage \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"channel\":\"$SLACK_CHANNEL\",\"thread_ts\":\"$SLACK_MESSAGE_TS\",\"text\":$ESCAPED}" > /dev/null 2>&1 || true
              # Remove thinking_face on cancel too
              curl -s -X POST https://slack.com/api/reactions.remove \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"channel\":\"$SLACK_CHANNEL\",\"timestamp\":\"$SLACK_MESSAGE_TS\",\"name\":\"thinking_face\"}" > /dev/null 2>&1 || true
              curl -s -X POST https://slack.com/api/reactions.add \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"channel\":\"$SLACK_CHANNEL\",\"timestamp\":\"$SLACK_MESSAGE_TS\",\"name\":\"no_entry_sign\"}" > /dev/null 2>&1 || true
            fi
            ;;
          azure-devops)
            if [ -n "$AZURE_DEVOPS_PAT" ] && [ -n "$AZURE_DEVOPS_ORG" ] && [ -n "$AZDO_WORK_ITEM_ID" ]; then
              AUTH=$(printf ':'"$AZURE_DEVOPS_PAT" | base64)
              AZDO_URL="https://dev.azure.com/$AZURE_DEVOPS_ORG/$AZURE_DEVOPS_PROJECT/_apis/wit/workitems/$AZDO_WORK_ITEM_ID"
              CANCEL_HTML="<p>⚠️ <strong>PO Agent run was cancelled.</strong></p><p><a href=\"https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\">workflow run</a></p>"
              curl -sf --http1.1 -X POST \
                "${AZDO_URL}/comments?api-version=7.1-preview.4" \
                -H "Authorization: Basic $AUTH" \
                -H "Content-Type: application/json" \
                -d "{\"text\": \"$CANCEL_HTML\"}" > /dev/null 2>&1 || true

              # Set failed tag
              CURRENT_TAGS=$(curl -sf "${AZDO_URL}?fields=System.Tags&api-version=7.0" \
                -H "Authorization: Basic $AUTH" | jq -r '.fields["System.Tags"] // ""')
              NEW_TAGS=$(echo "$CURRENT_TAGS" | tr ';' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
                grep -vE '^po-agent:(in-progress|waiting-ci|waiting-human|done|failed)$' | \
                tr '\n' ';' | sed 's/;$//')
              NEW_TAGS="${NEW_TAGS:+$NEW_TAGS; }po-agent:failed"
              curl -sf -X PATCH "${AZDO_URL}?api-version=7.0" \
                -H "Authorization: Basic $AUTH" \
                -H "Content-Type: application/json-patch+json" \
                -d "[{\"op\": \"replace\", \"path\": \"/fields/System.Tags\", \"value\": \"$NEW_TAGS\"}]" > /dev/null 2>&1 || true
            fi
            ;;
        esac
